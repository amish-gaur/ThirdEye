name: ThirdEye
options:
  bundleIdPrefix: com.aditya.thirdeye
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: "$(LOCAL_BUNDLE_ID)"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    TARGETED_DEVICE_FAMILY: "1"
    UIRequiresFullScreen: YES
    INFOPLIST_FILE: Supporting/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    DEVELOPMENT_TEAM: "$(LOCAL_DEVELOPMENT_TEAM)"

configFiles:
  Debug: signing.local.xcconfig
  Release: signing.local.xcconfig

targets:
  ThirdEye:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Supporting
      - path: Resources/Assets.xcassets
    info:
      path: Supporting/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: YES
        UIUserInterfaceStyle: Light
        CFBundleDisplayName: "ThirdEye"
        NSCameraUsageDescription: "Used for the live camera feed."
        NSMicrophoneUsageDescription: "Used during active incident calls."
        NSLocalNetworkUsageDescription: "Reaches the local SafeWatch action_router and LAN cameras."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: YES
          NSAllowsArbitraryLoads: YES
        NSBonjourServices:
          - "_safewatch._tcp"
          - "_http._tcp"
